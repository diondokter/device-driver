<html>

<head>
    <meta content="text/html;charset=utf-8" http-equiv="Content-Type" />
    <title>device-driver playground</title>
    <link rel="stylesheet" href="../assets/stylesheets/playground.css">
    <link rel="icon" type="image/png" href="../assets/images/ddsl.png" />
</head>

<body>
    <header>
        <a class="box nopad" href="../">
            <img src="../assets/images/ddsl.png" height="64px" />
        </a>
        <a class="box grow1"
            onclick="Website.then((w) => { if (confirm('Reset to default code example?')) { w.reset() }})">
            Reset code
        </a>
        <div class="box grow1">
            <label for="target-picker-select">Target:</label>
            <select class="grow10" name="targets" id="target-picker-select">
                <option value="Rust">Rust</option>
            </select>
        </div>
        <div class="box grow10">
            <label for="compiler-options-input">Options:</label>
            <textarea class="grow10" rows="2" cols="50" spellcheck="false" autocorrect="off" autocomplete="off"
                id="compiler-options-input"></textarea>
        </div>
    </header>

    <div id="editor-container">
        <div id="code-editor"></div>
        <div id="horizontal-separator" class="separator"></div>
        <div id="output-editor"></div>
        <div id="vertical-separator" class="separator"></div>
    </div>

    <div class="diagnostics-window">
        <pre><code id="diagnostics"></code></pre>
    </div>
</body>

</html>
