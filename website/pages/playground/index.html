<html>

<head>
    <meta content="text/html;charset=utf-8" http-equiv="Content-Type" />
    <title>device-driver playground</title>
    <link rel="stylesheet" href="../assets/stylesheets/playground.css">
    <link rel="icon" type="image/png" href="../assets/images/ddsl.png" />
</head>

<body>
    <ul id="header">
        <a href="../">
            <img src="../assets/images/ddsl.png" style="height: 100%; object-fit: contain;" />
        </a>
        <li id="compiler-options">
            <label for="options">Options:</label>
            <input type="text" id="compiler-options-input">
        </li>
        <li>
            <div id="target-picker">
                <label for="targets">Target:</label>
                <select name="targets" id="target-picker-select">
                    <option value="Rust">Rust</option>
                </select>
            </div>
        </li>
        <li>
            <a onclick="Website.then((w) => { if (confirm('Reset to default code example?')) { w.reset() }})">
                Reset code
            </a>
        </li>
    </ul>

    <div id="editor-container">
        <div id="code-editor"></div>
        <div id="horizontal-separator" class="separator"></div>
        <div id="output-editor"></div>
        <div id="vertical-separator" class="separator"></div>
    </div>

    <div class="diagnostics-window">
        <pre><code id="diagnostics"></code></pre>
    </div>
</body>

</html>
